spring:
  application:
    name: gateway
  security:
    oauth2:
      client:
        registration:
          spring:
            provider: spring
            client-id: client
            client-secret: secret
            authorization-grant-type: authorization_code
            client-authentication-method: "client_secret_basic"
            redirect-uri: "http://127.0.0.1:8002/login/oauth2/code/{registrationId}"
            scope:
              - "user.read"
              - "openid"
        provider:
          spring:
            issuer-uri: http://localhost:8002
server:
  port: 8000
logging:
  level:
    org:
      springframework:
        security: TRACE
