name: ParentCI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - ai-service
          - auth
          - batch-service
          - gateway
          - mail-service
          - problems-service

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: eclipse-temurin
          java-version: "25"
          cache: maven
          cache-dependency-path: "**/pom.xml"

      - run: mvn -B -ntp verify
